<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotMe Leaderboard</title>
  <link rel="stylesheet" href="/dashboard/static/style.css" />
</head>
<body>
  <header>
    <h1>Leaderboard</h1>
    <p><span class="tag">/v1/analytics/leaderboard</span></p>
  </header>
  <main>
    <section class="card">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
        <label for="metric">Metric</label>
        <select id="metric" style="padding:8px;border-radius:10px;border:1px solid #cad9ba;">
          <option value="xp">XP</option>
          <option value="rating">Rating</option>
        </select>
        <label for="limit">Rows</label>
        <select id="limit" style="padding:8px;border-radius:10px;border:1px solid #cad9ba;">
          <option value="10">10</option>
          <option value="20">20</option>
        </select>
        <a class="btn" href="#" onclick="reload();return false;">Apply</a>
      </div>
      <p id="status">Loading leaderboard...</p>
      <table>
        <thead>
          <tr>
            <th>Rank</th><th>Handle</th><th>XP</th><th>Rating</th><th>Level</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <a class="btn" href="#" onclick="prevPage();return false;">Prev</a>
        <a class="btn" href="#" onclick="nextPage();return false;">Next</a>
      </div>
    </section>
  </main>
  <script>
    let page = 1;

    function reload() {
      page = 1;
      loadLeaderboard();
    }

    function prevPage() {
      page = Math.max(1, page - 1);
      loadLeaderboard();
    }

    function nextPage() {
      page += 1;
      loadLeaderboard();
    }

    async function loadLeaderboard() {
      const status = document.getElementById('status');
      const tbody = document.getElementById('rows');
      const metric = document.getElementById('metric').value;
      const limit = document.getElementById('limit').value;
      try {
        const res = await fetch(`/v1/analytics/leaderboard?metric=${metric}&page=${page}&limit=${limit}`);
        if (!res.ok) throw new Error('failed to fetch leaderboard');
        const data = await res.json();
        tbody.innerHTML = '';
        for (const row of data.entries) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${row.rank}</td><td>${row.cf_handle}</td><td>${row.xp}</td><td>${row.rating}</td><td>${row.level}</td>`;
          tbody.appendChild(tr);
        }
        status.textContent = `Page ${data.page} | Loaded ${data.entries.length} entries of ${data.total}`;
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
      }
    }
    loadLeaderboard();
  </script>
</body>
</html>
