<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BotMe Dashboard</title>
  <link rel="stylesheet" href="/dashboard/static/style.css" />
</head>
<body>
  <header>
    <h1>BotMe Dashboard</h1>
    <p>Phase 5 MVP surface for leaderboard and user profile analytics.</p>
  </header>
  <main>
    <div class="grid">
      <section class="card">
        <h2>Leaderboard</h2>
        <p>View ranked users by XP or rating.</p>
        <a class="btn" href="/dashboard/leaderboard">Open Leaderboard</a>
      </section>
      <section class="card">
        <h2>Profile Insights</h2>
        <p>Inspect profile stats and chart-ready time-series payloads.</p>
        <a class="btn" href="/dashboard/profile">Open Profile</a>
      </section>
    </div>
  </main>
</body>
</html>
